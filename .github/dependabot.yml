version: 2
updates:
  - package-ecosystem: "gitsubmodule"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pip"
    target-branch: "main"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 100
    pull-request-branch-name:
      separator: "-"
