name: "Build"

on:
    push:
        branches:
            - "*"
    schedule:
        # 4:00 AM EST (UTC-5) = 9:00 AM UTC, weekdays only
        - cron: "0 9 * * 1-5"

concurrency:
    group: ${{ github.event_name == 'schedule' && 'schedule' || github.ref }}
    cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
    configure:
        name: "Configure"
        runs-on: ubuntu-latest
        steps:
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.13"

            - name: Fetch repository
              uses: actions/checkout@v5
              with:
                  submodules: true

            - name: Install UV
              run: |
                  curl -LsSf https://astral.sh/uv/install.sh | sh
                  echo "$HOME/.local/bin" >> $GITHUB_PATH

            - name: Create virtual environment and install dependencies
              run: |
                  uv venv
                  . .venv/bin/activate
                  uv pip install -r requirements/develop.txt

            - name: Configure
              id: configure
              continue-on-error: ${{ github.event_name == 'schedule' }}
              run: |
                  . .venv/bin/activate
                  make configure

            - name: Sync and create PR
              if: ${{ github.event_name == 'schedule' && steps.configure.outcome == 'failure' }}
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  . .venv/bin/activate
                  # Skip if an open sync PR already exists
                  if gh pr list --label auto-sync --state open --json number --jq '.[0].number' | grep -q .; then
                    echo "An open sync PR already exists — skipping."
                    exit 0
                  fi
                  make sync
                  if git diff --quiet; then
                    echo "No changes after sync — configure failure may require manual intervention."
                    exit 1
                  fi
                  branch="auto-sync-$(date +%Y-%m-%d)"
                  git checkout -b "$branch"
                  git add -A
                  git commit -m "Sync configuration"
                  git push origin "$branch"
                  gh pr create \
                    --title "Sync configuration" \
                    --label auto-sync \
                    --body "Automated PR created by the daily sync check. \`make configure\` failed, so \`make sync\` was run to fix the issues."

    lint:
        name: "Lint"
        runs-on: ubuntu-latest
        needs: configure
        steps:
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.13"

            - name: Fetch repository
              uses: actions/checkout@v5
              with:
                  submodules: true

            - name: Install UV
              run: |
                  curl -LsSf https://astral.sh/uv/install.sh | sh
                  echo "$HOME/.local/bin" >> $GITHUB_PATH

            - name: Create virtual environment and install dependencies
              run: |
                  uv venv
                  . .venv/bin/activate
                  uv pip install -r requirements/develop.txt

            - name: Lint
              run: |
                  . .venv/bin/activate
                  make lint

    test:
        name: "Test (Python ${{ matrix.python-version }})"
        runs-on: ubuntu-latest
        needs: configure
        strategy:
            matrix:
                python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        steps:
            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v5
              with:
                  python-version: "${{ matrix.python-version }}"
                  allow-prereleases: true

            - name: Fetch repository
              uses: actions/checkout@v5
              with:
                  submodules: true

            - name: Install UV
              run: |
                  curl -LsSf https://astral.sh/uv/install.sh | sh
                  echo "$HOME/.local/bin" >> $GITHUB_PATH

            - name: Create virtual environment and install dependencies
              run: |
                  uv venv
                  . .venv/bin/activate
                  uv pip install -r requirements/test.txt

            - name: Test
              run: |
                  . .venv/bin/activate
                  make test
