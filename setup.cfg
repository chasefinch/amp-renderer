# See https://www.chasefinch.com/nitpick-style.toml

[docformatter]
wrap-descriptions = 79

[flake8]
select = WPS
extend-exclude =
	bin, lib, dist, prof, build,
	.pytest_cache, __pycache__,
	.git, .venv
filename = *.py
inline-quotes = double

nested-classes-whitelist = Meta, Params, Config, Media

# Re-enable some names that are real words or well-understood
allowed-domain-names = id, id_, pk, i, q, db, s3, ui, js, ip, of, by, ad, handle, objects, value, values, result, results, item, items, param, params, arg, args, x, y, z, dx, dy, dz, x1, x2, x3, y1, y2, y3, z1, z2, z3
forbidden-domain-names = index, err, foo, bar, baz, quux, foobar, klass, idx, buf, exc, con, conn, db_conn, req, res, resp, cur, col, pos, sep, fmt, dt

ignore = WPS300, WPS475

extend-ignore =
# amp-renderer-specific opt-outs
	# Underscored number pattern
	WPS114,
	# Complexity rules
	WPS2,
	# Allow liberal noqa use
	WPS402,
	# Allow nested try blocks
	WPS505,
	# @staticmethod usage
	WPS602,
	# "Unpythonic getters/setters" implementation is buggy
	WPS615,
	# Allow loop variables after block
	WPS441

per_file_ignores =
# Allow arbitrary input for testing
	*/tests/*: WPS118, WPS432, WPS339

multiline-quotes = """
